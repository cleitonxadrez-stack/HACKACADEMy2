<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos — HACK ACADEMY</title>
  <meta name="description" content="Trilha oficial de certificações da HACK ACADEMY: Professor Mentor, Gestor, Organizador, Avaliador e Especialista HACK BRASIL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cursos">

  <div id="header-placeholder"></div>

  <main>
    <!-- HERO -->
    <section class="gradient-hero py-14 text-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <span class="badge badge-yellow mb-4"><i class="fa-solid fa-book mr-1.5"></i> Catálogo</span>
        <h1 class="font-display text-4xl font-extrabold mb-3">Cursos da HACK ACADEMY</h1>
        <p class="text-slate-200 max-w-2xl mx-auto mb-8">Escolha um curso, aprenda na prática e aplique o conhecimento em um projeto real.</p>
        <img src="images/hack-cursos-equipe-planejamento.png" alt="Equipe da HACK ACADEMY colaborando em planejamento prático de curso" class="rounded-2xl shadow-xl w-full max-w-3xl mx-auto h-56 object-cover ring-2 ring-brand-yellow/40">
      </div>
    </section>

    <!-- FILTROS + BUSCA -->
    <section class="py-8 bg-white border-b border-slate-100 sticky top-20 z-30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row gap-4 lg:items-center lg:justify-between">
          <div class="relative w-full lg:max-w-md">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input id="search-input" type="text" placeholder="Buscar curso, professor ou competência..." class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60 text-sm">
          </div>
          <div id="filter-tabs" class="flex flex-wrap gap-2">
            <button data-filter="Todos" class="filter-btn active px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Todos</button>
            <button data-filter="Formação Inicial" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 1 · Explorador (Alunos)</button>
            <button data-filter="Formação de Professores" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 1 · Professor Mentor</button>
            <button data-filter="Gestão Escolar" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 2 · Gestor</button>
            <button data-filter="Organização de Eventos" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 3 · Organizador</button>
            <button data-filter="Avaliação" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 4 · Avaliador</button>
            <button data-filter="Especialização" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200">Nível 5 · Especialista</button>
          </div>
        </div>
      </div>
    </section>

    <!-- GRID DE CURSOS -->
    <section class="py-14 bg-slate-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <p id="results-count" class="text-slate-500 text-sm mb-6"></p>
        <div id="courses-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-7">
          <div class="skeleton rounded-2xl h-96"></div>
          <div class="skeleton rounded-2xl h-96"></div>
          <div class="skeleton rounded-2xl h-96"></div>
          <div class="skeleton rounded-2xl h-96"></div>
          <div class="skeleton rounded-2xl h-96"></div>
          <div class="skeleton rounded-2xl h-96"></div>
        </div>
        <div id="empty-state" class="hidden text-center py-16">
          <i class="fa-solid fa-magnifying-glass text-4xl text-slate-300 mb-4"></i>
          <p class="text-slate-500">Nenhum curso encontrado com esses filtros.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="js/common.js"></script>
  <script src="js/cursos.js"></script>

  <style>
    .filter-btn{ color:#475569; background:#fff; transition: all .2s ease; }
    .filter-btn.active, .filter-btn:hover{ background: var(--ha-black); color: var(--ha-yellow); border-color: var(--ha-black); }
  </style>
</body>
</html>
