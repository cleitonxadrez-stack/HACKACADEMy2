<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — HACK ACADEMY</title>
  <meta name="description" content="Entre em contato com a HACK ACADEMY: formulário, WhatsApp, Instagram, LinkedIn e Email.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

<body data-page="contato">

  <div id="header-placeholder"></div>

  <main>
    <section class="gradient-hero text-white py-14">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <span class="badge badge-yellow mb-4"><i class="fa-solid fa-comments mr-1.5"></i> Contato</span>
        <h1 class="font-display text-4xl font-extrabold mb-3">Fale com a HACK ACADEMY</h1>
        <p class="text-slate-200 max-w-2xl mx-auto">Tire suas dúvidas, envie sugestões ou converse com nosso time.</p>
      </div>
    </section>

    <section class="py-16 bg-white">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-5 gap-12">
        <!-- FORM -->
        <div class="lg:col-span-3">
          <h2 class="font-display text-2xl font-bold text-slate-900 mb-6">Envie uma mensagem</h2>
          <form id="contact-form" class="space-y-5">
            <div class="grid sm:grid-cols-2 gap-5">
              <div>
                <label for="contact-name" class="block text-sm font-medium text-slate-700 mb-1.5">Nome</label>
                <input id="contact-name" type="text" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60 text-sm">
              </div>
              <div>
                <label for="contact-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input id="contact-email" type="email" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60 text-sm">
              </div>
            </div>
            <div>
              <label for="contact-subject" class="block text-sm font-medium text-slate-700 mb-1.5">Assunto</label>
              <input id="contact-subject" type="text" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60 text-sm">
            </div>
            <div>
              <label for="contact-message" class="block text-sm font-medium text-slate-700 mb-1.5">Mensagem</label>
              <textarea id="contact-message" rows="5" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60 text-sm resize-none"></textarea>
            </div>
            <button type="submit" id="contact-submit-btn" class="btn-primary px-8 py-3.5 rounded-lg font-semibold inline-flex items-center gap-2">
              Enviar mensagem <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
            <p id="contact-success" class="hidden text-brand-yellow-dark text-sm font-medium mt-3" style="color:#B08900;"><i class="fa-solid fa-circle-check mr-1.5"></i>Mensagem enviada com sucesso! Em breve retornaremos.</p>
          </form>
        </div>

        <!-- INFO -->
        <div class="lg:col-span-2 space-y-5">

          <div class="bg-slate-50 rounded-2xl p-6 flex items-start gap-4">
            <span class="w-12 h-12 rounded-xl bg-black text-brand-yellow flex items-center justify-center text-lg shrink-0"><i class="fa-solid fa-envelope"></i></span>
            <div>
              <p class="font-semibold text-slate-900">Email</p>
              <a href="mailto:contato@hackacademy.com.br" class="text-slate-500 text-sm hover:text-brand-yellow-dark">contato@hackacademy.com.br</a>
            </div>
          </div>
          <div class="bg-slate-50 rounded-2xl p-6 flex items-start gap-4">
            <span class="w-12 h-12 rounded-xl bg-brand-yellow text-black flex items-center justify-center text-lg shrink-0"><i class="fa-brands fa-whatsapp"></i></span>
            <div>
              <p class="font-semibold text-slate-900">WhatsApp</p>
              <a href="https://wa.me/5500000000000" target="_blank" rel="noopener" class="text-slate-500 text-sm hover:text-brand-yellow-dark">Conversar agora</a>
            </div>
          </div>
          <div class="bg-slate-50 rounded-2xl p-6 flex items-start gap-4">
            <span class="w-12 h-12 rounded-xl bg-black text-brand-yellow flex items-center justify-center text-lg shrink-0"><i class="fa-brands fa-instagram"></i></span>
            <div>
              <p class="font-semibold text-slate-900">Instagram</p>
              <a href="https://instagram.com" target="_blank" rel="noopener" class="text-slate-500 text-sm hover:text-brand-yellow-dark">@hackacademy</a>
            </div>
          </div>
          <div class="bg-slate-50 rounded-2xl p-6 flex items-start gap-4">
            <span class="w-12 h-12 rounded-xl bg-brand-yellow text-black flex items-center justify-center text-lg shrink-0"><i class="fa-brands fa-linkedin-in"></i></span>
            <div>
